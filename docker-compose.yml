version: '3.8'

services:
  tapedeck:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapedeck
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data
      - ./config.yml:/app/config.yml
      - ./.session_secret:/app/.session_secret
      - ./tapedeck.log:/app/tapedeck.log
    env_file:
      - .env
    environment:
      - PORT=3001
      - DATA_DIR=/data
      - PUID=1000
      - PGID=1000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
