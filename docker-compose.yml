version: '3.8'

services:
  tapedeck:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapedeck
    ports:
      - "3001:3001"
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - PORT=3001
      - DATABASE_PATH=/data/tapedeck.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
