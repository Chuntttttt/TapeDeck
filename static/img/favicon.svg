<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a"/>

  <!-- Cassette body -->
  <rect x="15" y="25" width="70" height="50" rx="3" fill="#2a2a2a" stroke="#d4af37" stroke-width="2"/>

  <!-- Top label area -->
  <rect x="20" y="30" width="60" height="15" fill="#1a1a1a"/>

  <!-- Reels -->
  <circle cx="35" cy="57" r="10" fill="#1a1a1a" stroke="#d4af37" stroke-width="2"/>
  <circle cx="65" cy="57" r="10" fill="#1a1a1a" stroke="#d4af37" stroke-width="2"/>

  <!-- Reel centers -->
  <circle cx="35" cy="57" r="4" fill="#d4af37"/>
  <circle cx="65" cy="57" r="4" fill="#d4af37"/>

  <!-- Tape window -->
  <path d="M 40 52 Q 50 50 60 52 L 60 62 Q 50 64 40 62 Z" fill="#3a3a3a"/>

  <!-- Screws -->
  <circle cx="25" cy="35" r="1.5" fill="#666"/>
  <circle cx="75" cy="35" r="1.5" fill="#666"/>
  <circle cx="25" cy="65" r="1.5" fill="#666"/>
  <circle cx="75" cy="65" r="1.5" fill="#666"/>
</svg>
